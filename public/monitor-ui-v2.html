  startHttpPolling();

// 格式化在线时长
function formatUptime(seconds) {
  if (!seconds || seconds === 0) return '0m';
  
  const days = Math.floor(seconds / 86400);
  const hours = Math.floor((seconds % 86400) / 3600);
  const minutes = Math.floor((seconds % 3600) / 60);

  if (days > 0) {
    return `${days}d ${hours}h ${minutes}m`;
  } else if (hours > 0) {
    return `${hours}h ${minutes}m`;
  } else {
    return `${minutes}m`;
  }
}

// ==================== HTTP 轮询函数 ====================
function startHttpPolling() {

  if (httpPollingTimer) {
    console.log('[Monitor] HTTP轮询已在运行，跳过');
    return;
  }
  
  console.log('📡 开始 HTTP 轮询');

  // 立即获取一次数据
  fetchViaHttp();

  // 每 30 秒获取一次数据（大幅减少对OpenClaw网关的干扰）
  httpPollingTimer = setInterval(fetchViaHttp, 30000);

  // 不预设连接状态，等待health检查结果
  // isGatewayConnected会在fetchViaHttp中根据health检查结果设置
}

function fetchViaHttp() {
  // 防止重复请求
  if (window.isFetchingData) {
    console.log('[Monitor] 请求进行中，跳过本次');
    return;
  }
  
  window.isFetchingData = true;
  
  // 从本地存储获取网关信息
  const boundGatewayStr = localStorage.getItem('bound_gateway');
  
  if (!boundGatewayStr) {
    console.error('[Monitor] 未找到绑定的网关信息');
    console.log('💡 请先绑定网关');
    // 显示离线状态
    isGatewayConnected = false;
    updateStatusCard();
    window.isFetchingData = false;
    return;
  }

  let boundGateway;
  try {
    boundGateway = JSON.parse(boundGatewayStr);
  } catch (error) {
    console.error('[Monitor] 解析网关信息失败:', error);
    boundGateway = null;
  }

  // 如果没有绑定信息，使用默认网关配置
  if (!boundGateway || !boundGateway.gatewayUrl) {
    console.warn('[Monitor] 未找到网关绑定信息，使用默认配置');
    boundGateway = {
      gatewayId: 'default-gateway',
      gatewayUrl: 'http://127.0.0.1:18789',
      token: '5e98fba1fb42f1ed15c0b3c5b947ce4d02e483d7e1fc32f8'
    };
    // 保存到localStorage，避免下次再提示
    localStorage.setItem('bound_gateway', JSON.stringify(boundGateway));
    console.log('[Monitor] 已设置默认网关配置');
  }

  const gatewayUrl = boundGateway.gatewayUrl;
  
  if (!gatewayUrl) {
    console.error('[Monitor] 网关地址为空');
    console.log('💡 请重新绑定网关');
    isGatewayConnected = false;
    updateStatusCard();
    return;
  }
  
  console.log('[Monitor] 使用网关地址:', gatewayUrl);

  // 使用网关 API 获取状态
  const userToken = localStorage.getItem('token');  // 用户登录后的 JWT Token

  const headers = {
    'Content-Type': 'application/json'
  };

  // 规范化网关URL
  let normalizedUrl = gatewayUrl;
  if (normalizedUrl.includes('127.0.0.1') || normalizedUrl.includes('localhost')) {
    normalizedUrl = normalizedUrl.replace(/^https/, 'http');
  }

  // 判断是否为本地网关，使用代理
  const isLocalGateway = normalizedUrl.includes('127.0.0.1') || normalizedUrl.includes('localhost');

  // 优化：不发送health请求，直接通过API Wrapper检查Gateway状态
  // 这样可以避免频繁的HTTP请求干扰OpenClaw Gateway
  console.log('[Monitor] 检查Gateway状态（通过API Wrapper）');

  // 注意: openclaw-monitor服务不需要Token认证
  // gatewayToken是用于OpenClaw Gateway的,不是用于monitor API
  // 所以这里不需要添加Authorization header

  // 直接获取数据，不单独发送health检查
  // 添加重试机制，处理ERR_NETWORK_CHANGED等临时错误
  const fetchWithRetry = (url, options, retries = 3) => {
    return fetch(url, options).catch(err => {
      if (retries > 0 && (err.name === 'TypeError' || err.message.includes('NETWORK'))) {
        console.log(`[Monitor] 重试请求: ${url}, 剩余重试次数: ${retries}`);
        return new Promise(resolve => {
          setTimeout(() => {
            fetchWithRetry(url, options, retries - 1).then(resolve).catch(() => resolve(null));
          }, 1000);
        });
      }
      return null;
    });
  };

  // 直接获取数据，不单独发送health检查
  Promise.all([
    fetchWithRetry('/monitor-api/api/sessions/list', {
      method: 'GET',
      headers: headers
    }),
    fetchWithRetry('/monitor-api/api/metrics/system', {
      method: 'GET',
      headers: headers
    }),
    fetchWithRetry('/monitor-api/api/metrics/memory', {
      method: 'GET',
      headers: headers
    }),
    fetchWithRetry('/monitor-api/api/messages/stats', {
      method: 'GET',
      headers: headers
    })
  ]).then(([sessionsRes, systemRes, memoryRes, messagesRes]) => {
    return Promise.all([
      sessionsRes && sessionsRes.ok ? sessionsRes.json().catch(() => null) : Promise.resolve(null),
      systemRes && systemRes.ok ? systemRes.json().catch(() => null) : Promise.resolve(null),
      memoryRes && memoryRes.ok ? memoryRes.json().catch(() => null) : Promise.resolve(null),
      messagesRes && messagesRes.ok ? messagesRes.json().catch(() => null) : Promise.resolve(null)
    ]);
  }).then(([sessions, systemMetrics, memoryMetrics, messageMetrics]) => {
    console.log('📊 网关数据:', { sessions, systemMetrics, memoryMetrics, messageMetrics });
    
    // 判断Gateway是否在线：如果API返回了有效数据，说明Gateway在线
    const isOnline = sessions || systemMetrics || memoryMetrics || messageMetrics;
    
    if (!isOnline) {
      // 所有API都失败，Gateway离线
      console.error('[Monitor] Gateway离线');
      isGatewayConnected = false;
      updateStatusCard();
      return;
    }
    
    // Gateway在线
    console.log('✅ Gateway在线');
    isGatewayConnected = true;
    updateStatusCard();
    
    // 构造网关数据
    const gatewayData = {
      gateways: [{
        id: boundGateway.gatewayId,
        gatewayUrl: boundGateway.gatewayUrl,
        connectionStatus: 'running',
        metrics: {
          sessions: sessions?.total || 0,
          model: sessions?.sessions?.[0]?.model || 'modelstudio/qwen3.5-flash',
          // 使用totalTokenStats获取总Token（历史+当前）
          tokenUsed: sessions?.totalTokenStats?.totalTokens || sessions?.sessions?.[0]?.estimatedTokens || 0,
          tokenSource: sessions?.totalTokenStats?.tokenSource || 'estimate',
          messageCount: sessions?.totalTokenStats?.messageCount || messageMetrics?.global?.totalMessages || 0,
          onlineTime: formatUptime(systemMetrics?.uptimeSeconds || 0),
          memoryMB: memoryMetrics?.totals?.rssMB || 0,
          dailyStats: messageMetrics?.dailyStats || {} // 添加7天趋势数据
        }
      }]
    };

    console.log('[Monitor] gatewayData:', JSON.stringify(gatewayData, null, 2));

      // 更新会话数 (从第一个 Gateway 获取)
      if (gatewayData.gateways && gatewayData.gateways.length > 0) {
        const firstGateway = gatewayData.gateways[0];
        const metrics = firstGateway.metrics || {};

        console.log('[Monitor] firstGateway:', JSON.stringify(firstGateway, null, 2));
        console.log('[Monitor] metrics:', JSON.stringify(metrics, null, 2));

        // 更新运行状态 - 根据实际连接状态判断
        isGatewayConnected = firstGateway.connectionStatus === 'running';
        updateStatusCard();

        // 更新会话数
        const sessionCount = metrics.sessions || 0;
        document.getElementById('sessions').textContent = sessionCount;

        // 更新模型信息 - 优先从metrics获取，降级从agents获取
        let modelValue = metrics.model;
        if ((!modelValue || modelValue === 'unknown') && gatewayData.agents && gatewayData.agents.length > 0) {
          modelValue = gatewayData.agents[0].model;
        }
        if (modelValue && modelValue !== 'unknown') {
          currentModel = modelValue;
          document.getElementById('model').textContent = currentModel;
        } else {
          document.getElementById('model').textContent = '-';
        }

        // 更新 TOKEN 使用（直接使用后端返回的总Token）
        // 后端已经计算了：总Token = 历史Token + 当前会话Token
        const totalTokensFromBackend = metrics.tokenUsed || 0;
        const tokenSource = metrics.tokenSource || 'estimate';

        console.log('[Token] 后端返回的总Token:', totalTokensFromBackend, '数据来源:', tokenSource);

        // 直接使用后端返回的总Token
        if (totalTokensFromBackend > 0) {
          totalTokens = totalTokensFromBackend;

          // 保存到localStorage（用于页面刷新后恢复）
          localStorage.setItem(STORAGE_KEYS.totalTokens, totalTokens);
        }

        // 显示Token
        if (totalTokens >= 100000000) {
          document.getElementById('token-value').textContent = (totalTokens / 100000000).toFixed(2) + ' ' + t('hundredMillion');
        } else if (totalTokens >= 10000) {
          document.getElementById('token-value').textContent = Math.round(totalTokens / 10000) + ' ' + t('tenThousand');
        } else {
          document.getElementById('token-value').textContent = totalTokens.toLocaleString();
        }

        // 根据 tokenSource 动态显示/隐藏估算提示
        const estimateHint = document.querySelector('.estimate-hint');
        if (estimateHint) {
          if (metrics.tokenSource === 'api') {
            estimateHint.style.display = 'none';
          } else {
            estimateHint.style.display = 'inline-flex';
          }
        }

        // 更新消息数（累计显示）
        const currentMessageCount = metrics.messageCount || 0;
        
        // 累计消息：直接累加当前消息数到总数
        // 使用lastMessageCount记录上次的值，避免重复累加
        if (currentMessageCount > 0) {
          const lastMessageCount = parseInt(localStorage.getItem('lastMessageCount') || '0');
          
          // 如果当前消息数比上次大，说明有新消息
          if (currentMessageCount > lastMessageCount) {
            const newMessages = currentMessageCount - lastMessageCount;
            messageCount += newMessages;
            
            // 保存到localStorage
            localStorage.setItem(STORAGE_KEYS.messageCount, messageCount);
            localStorage.setItem('lastMessageCount', currentMessageCount);
            
            console.log('[消息] 新增消息:', newMessages, '累计消息:', messageCount);
          } else if (currentMessageCount < lastMessageCount) {
            // 当前消息数比上次小，说明会话被重置了
            // 将当前消息数累加到总数
            messageCount += currentMessageCount;
            
            localStorage.setItem(STORAGE_KEYS.messageCount, messageCount);
            localStorage.setItem('lastMessageCount', currentMessageCount);
            
            console.log('[消息] 会话重置，累加消息:', currentMessageCount, '累计消息:', messageCount);
          } else if (lastMessageCount === 0) {
            // 首次加载，直接使用当前消息数
            messageCount = currentMessageCount;
            localStorage.setItem(STORAGE_KEYS.messageCount, messageCount);
            localStorage.setItem('lastMessageCount', currentMessageCount);
            
            console.log('[消息] 首次加载，消息数:', messageCount);
          }
        }
        
        document.getElementById('messages').textContent = messageCount.toLocaleString();

        // 更新在线时长（HTTP模式下优先使用后端数据，避免跳变）
        if (metrics.onlineTime) {
          document.getElementById('uptime').textContent = metrics.onlineTime;
          // 同步更新前端的 onlineSeconds，避免定时器覆盖
          const parts = metrics.onlineTime.match(/(\d+)h\s*(\d+)m/);
          if (parts) {
            onlineSeconds = parseInt(parts[1]) * 3600 + parseInt(parts[2]) * 60;
            localStorage.setItem(STORAGE_KEYS.onlineSeconds, onlineSeconds);
          }
        }

        // 更新内存（保存到 gatewayMemoryMB，由 updateMemory 统一显示）
        gatewayMemoryMB = metrics.memoryMB || metrics.memoryUsed || 0;
        updateMemory(); // 立即更新内存显示

        // 更新渠道数据
        if (firstGateway.channels && firstGateway.channels.length > 0) {
          updateChannelDisplay(firstGateway.channels);
        }

        // 更新任务数据
        if (firstGateway.tasks && firstGateway.tasks.length > 0) {
          updateTaskDisplay(firstGateway.tasks);
        }

        // 更新7天消息趋势图
        if (metrics.dailyStats && Object.keys(metrics.dailyStats).length > 0) {
          update7DayChart(metrics.dailyStats);
        }

        console.log('✅ 数据更新成功');
        
        // 数据更新后，更新主会话面板
        updateMainSessionPanel();
      } else {
        console.log('[Monitor] 无 Gateway 数据');
        // 无Gateway数据时设置为离线
        isGatewayConnected = false;
        updateStatusCard();
      }
  }).catch(error => {
    console.error('❌ API请求失败:', error.message);
    // API请求失败时设置为离线
    isGatewayConnected = false;
    updateStatusCard();
  }).finally(() => {
    // 释放请求锁
    window.isFetchingData = false;
  });
}

  const payload = data.params || data.payload || {};

  // TOKEN 累加
  if (usage) {
    const tokens = usage.total || usage.totalTokens || usage.total_tokens || 0;
    if (tokens > 0) {
      totalTokens += tokens;
      localStorage.setItem(STORAGE_KEYS.totalTokens, totalTokens);
      updateTokenCard();

  updateMessageCard();
  updateMainSessionPanel();
  
  // 保存到历史记录
  saveMessageToHistory(1);

}

// ==================== 7天消息趋势图更新 ====================
function update7DayChart(dailyStats) {
  if (!charts.channelChart) return;

  // 生成完整7天日期（包括没有数据的日期），使用本地日期避免时区偏移
  const allDates = [];
  const today = new Date();
  const toLocalDateStr = (d) => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    allDates.push(toLocalDateStr(d));
  }

  // 从localStorage读取历史数据
  const historyKey = 'monitor_message_history';
  const history = JSON.parse(localStorage.getItem(historyKey) || '{}');
  
  // 合并API返回的数据到历史记录
  if (dailyStats && Object.keys(dailyStats).length > 0) {
    for (const date in dailyStats) {
      if (dailyStats[date].total > 0) {
        history[date] = dailyStats[date];
      }
    }
    // 保存到localStorage
    localStorage.setItem(historyKey, JSON.stringify(history));
  }

  const dateLabels = allDates.map(d => d.slice(5)); // "04-07"
  const users = allDates.map(d => history[d]?.user || 0);
  const assistants = allDates.map(d => history[d]?.assistant || 0);
  const toolResults = allDates.map(d => history[d]?.toolResult || 0);
  const totals = allDates.map(d => history[d]?.total || 0);

  charts.channelChart.setOption({
    title: {text: t('sevenDayTrend'), left: 'center', top: 10, textStyle: {fontSize: 12, color: '#666'}},
    tooltip: {trigger: 'axis', axisPointer: {type: 'shadow'}},
    legend: {data: [t('userMessage'), t('assistantReply'), t('toolResult')], top: 30, textStyle: {fontSize: 10}, itemGap: 20},
    grid: {top: 55, bottom: 20, left: 40, right: 20},
    xAxis: {type: 'category', data: dateLabels, axisLabel: {color: '#999', fontSize: 10}},
    yAxis: {type: 'value', splitLine: {lineStyle: {color: '#f0f0f0'}}, axisLabel: {color: '#999', fontSize: 10}},
    series: [
      {name: t('userMessage'), type: 'bar', stack: 'total', data: users, itemStyle: {color: '#5470C6'}},
      {name: t('assistantReply'), type: 'bar', stack: 'total', data: assistants, itemStyle: {color: '#91CC75'}},
      {name: t('toolResult'), type: 'bar', stack: 'total', data: toolResults, itemStyle: {color: '#FAC858'}}
    ]
  });

  console.log('[Monitor] 7天消息趋势图已更新, 日期:', dateLabels, '总计:', totals);
}

function updateTaskList(jobs) {
  const tbody = document.getElementById('task-table-body');
  if (!tbody) return;
  
  if (jobs.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#999">' + t('noTasks') + '</td></tr>';
    return;
  }
  
  let html = '';
  
  jobs.forEach(function(job) {
    const name = job.name || job.id || t('unknownTask');
    const enabled = job.enabled !== false;
    const status = enabled ? t('running') : t('disabled');
    const statusClass = enabled ? 'tag-warning' : 'tag-info';

    html += `
      <tr>
        <td><strong>${name}</strong></td>
        <td>
          <span class="tag ${statusClass}">${status}</span>
        </td>
      </tr>
    `;
  });
  
  tbody.innerHTML = html;
}

// ==================== 内存占用 ====================
let gatewayMemoryMB = 0; // 后端返回的 Gateway 内存

function updateMemory() {
  // 离线状态下显示0 MB
  if (!isGatewayConnected) {
    const card = document.getElementById('memory');
    if (card) {
      card.textContent = '0 MB';
    }
    console.log('[内存] 离线状态,显示: 0 MB');
    return;
  }

  // 在 HTTP 模式下，优先使用后端返回的 Gateway 内存数据
  if (isHttpMode && gatewayMemoryMB > 0) {
    const card = document.getElementById('memory');
    if (card) {
      card.textContent = gatewayMemoryMB + ' MB';
    }
    console.log('[内存] Gateway内存:', gatewayMemoryMB, 'MB');
    return;
  }

  // WebSocket 模式下使用浏览器内存估算
  let memoryMB = 0;

  if (performance.memory) {
    // Chrome 浏览器支持
    memoryMB = Math.round(performance.memory.usedJSHeapSize / 1048576);
  } else {
    // 估算
    const tokens = totalTokens || 0;
    const messages = messageCount || 0;
    memoryMB = Math.round(50 + (tokens * 0.001) + (messages * 0.1));
  }

  const card = document.getElementById('memory');
  if (card) {
    card.textContent = memoryMB + ' MB';
  }

  console.log('[内存] 当前:', memoryMB, 'MB');
}

// ==================== 消息历史 ====================
function saveMessageToHistory(count = 1) {
  const today = new Date().toISOString().slice(5, 10); // "03-30"
  const data = JSON.parse(localStorage.getItem(STORAGE_KEYS.msgHistory) || '{}');
  data[today] = (data[today] || 0) + count;
  localStorage.setItem(STORAGE_KEYS.msgHistory, JSON.stringify(data));
  console.log('[历史] 更新:', data[today], '日期:', today);
}

function get7DayHistory() {
  const dates = [];
  const messages = [];
  
  for (let i = 6; i >= 0; i--) {
    const date = new Date();
    date.setDate(date.getDate() - i);
    const key = date.toISOString().slice(5, 10); // "03-24"
    dates.push(key);
    
    const data = JSON.parse(localStorage.getItem(STORAGE_KEYS.msgHistory) || '{}');
    messages.push(data[key] || 0);
  }
  
  return {dates, messages};
}

// ==================== Agent标签页管理 ====================
let agents = [
  { id: 'main', name: 'Main Agent', gatewayUrl: '', token: '', connected: false }
];
let currentAgentId = 'main';

// 打开绑定向导
function openBindWizard() {

// 删除Agent
function deleteAgent(agentId) {
  console.log('========== deleteAgent 开始 ==========');
  console.log('agentId:', agentId);
  console.log('当前agents数量:', agents.length);

  const agent = agents.find(a => a.id === agentId);
  console.log('找到的agent:', agent);

  if (!agent) {
    console.error('未找到对应的agent');
    alert(t('agentNotFound'));
    return;
  }

  // 确认删除
  if (!confirm(t('deleteConfirm', {name: agent.name}))) {
    console.log('用户取消删除');
    return;
  }

  // 从后端删除Agent配置
  const userToken = localStorage.getItem('token');
  if (!userToken) {
    console.error('用户未登录');
    alert(t('pleaseLogin'));
    return;
  }

  // 查找对应的Gateway配置ID
  const gatewayId = agent.gatewayId;
  console.log('准备删除的gatewayId:', gatewayId);

  if (gatewayId) {
    console.log('开始调用删除API:', `/api/gateway/unbind/${gatewayId}`);
    fetch(`/api/gateway/unbind/${gatewayId}`, {
      method: 'DELETE',
      headers: {
        'Authorization': `Bearer ${userToken}`
      }
    })
    .then(response => {
      console.log('删除API响应状态:', response.status);
      return response.json();
    })
    .then(data => {
      console.log('Delete response:', data);
      if (data.success) {
        alert(t('deleteSuccess'));

        // Notify parent window to navigate (since we're in an iframe)
        console.log('Notify parent to navigate to MonitorPage');
        window.parent.postMessage({ type: 'navigate', path: '/' }, '*');
      } else {
        console.error('Delete failed:', data.message);
        alert(t('deleteFailed') + ': ' + data.message);
      }
    })
    .catch(error => {
      console.error('Delete agent failed:', error);
      alert(t('deleteFailed') + ': ' + error.message);
    });
  } else {
    // 如果没有Gateway ID，只是从本地列表中移除
    console.log('No gatewayId, removing from local list only');
    alert(t('deleteSuccess'));

    // Notify parent window to navigate
    console.log('Notify parent to navigate to MonitorPage');
    window.parent.postMessage({ type: 'navigate', path: '/' }, '*');
  }
  console.log('========== deleteAgent 结束 ==========');
}

// 切换Agent标签页
function switchAgentTab(agentId) {
  currentAgentId = agentId;
  renderAgentTabs();

  const agent = agents.find(a => a.id === agentId);
  if (agent) {
    const agentNameElement = document.getElementById('agent-name');
    if (agentNameElement) {
      agentNameElement.textContent = agent.name;
    }

    // 如果Agent有配置的Gateway URL和Token，重新连接
    if (agent.gatewayUrl && agent.token) {
      localStorage.setItem('gatewayToken', agent.token);

      // 安全地关闭WebSocket连接
      if (ws && ws.readyState !== WebSocket.CLOSED) {
        try {
          ws.close();
        } catch (error) {
          console.log('关闭WebSocket时出错:', error);
        }
      }

      // 延迟重新连接
      setTimeout(() => {
        connectToGateway();
      }, 500);
    } else {
      // 清空监控数据
      resetMonitorData();
    }
  }
}

// 渲染Agent标签页
function renderAgentTabs() {
  const tabsContainer = document.querySelector('.agent-tabs-header');
  if (!tabsContainer) {
    console.error('未找到.agent-tabs-header元素');
    return;
  }

  console.log('开始渲染Agent标签页，agents数量:', agents.length);

  tabsContainer.innerHTML = '';

  agents.forEach(agent => {
    const tab = document.createElement('div');
    tab.className = `agent-tab-item ${agent.id === currentAgentId ? 'active' : ''}`;
    tab.setAttribute('data-agent-id', agent.id);
    tab.onclick = () => switchAgentTab(agent.id);

    const nameSpan = document.createElement('span');
    nameSpan.className = 'agent-name';
    nameSpan.textContent = agent.name;

    const deleteSpan = document.createElement('span');
    deleteSpan.className = 'delete-btn';
    deleteSpan.textContent = '🗑️';
    // 始终显示删除按钮，允许删除
    deleteSpan.style.opacity = '1';
    deleteSpan.style.pointerEvents = 'auto';
    deleteSpan.onclick = (e) => {
      e.stopPropagation();
      deleteAgent(agent.id);
    };

    tab.appendChild(nameSpan);
    tab.appendChild(deleteSpan);
    tabsContainer.appendChild(tab);

    console.log('已创建Agent标签页:', agent.name, '删除按钮透明度:', deleteSpan.style.opacity);
  });

  // 添加"+"按钮
  const addTab = document.createElement('div');
  addTab.className = 'agent-tab-item';
  addTab.onclick = openBindWizard;
  addTab.innerHTML = '<span class="add-tab-icon">+</span>';
  tabsContainer.appendChild(addTab);

  console.log('Agent标签页渲染完成');
}

// 重置监控数据
function resetMonitorData() {
  const statusValue = document.getElementById('status-value');
  const sessions = document.getElementById('sessions');
  const tokenValue = document.getElementById('token-value');
  const uptime = document.getElementById('uptime');
  const memory = document.getElementById('memory');
  const messages = document.getElementById('messages');
  const model = document.getElementById('model');

  if (statusValue) statusValue.innerHTML = '<span class="dot red"></span>' + t('notConnected');
  if (sessions) sessions.textContent = '-';
  if (tokenValue) tokenValue.textContent = '0';
  if (uptime) uptime.textContent = '0h 0m';
  if (memory) memory.textContent = '0 MB';
  if (messages) messages.textContent = '0';
  if (model) model.textContent = '-';
}

// 从localStorage获取Agent列表并更新
async function loadAgentsFromBackend() {
  try {
    console.log('开始加载Agent列表...');

    // 从localStorage读取网关信息
    const boundGatewayStr = localStorage.getItem('bound_gateway');
    if (!boundGatewayStr) {
      console.log('没有绑定网关，跳过加载Agent列表');
      return;
    }

    const boundGateway = JSON.parse(boundGatewayStr);
    console.log('从localStorage读取的网关信息:', boundGateway);

    // 将网关信息转换为Agent数据
    agents = [{
      id: 'main',
      name: boundGateway.name || 'Main Agent',
      gatewayUrl: boundGateway.gatewayUrl,
      token: boundGateway.token,
      connected: boundGateway.status === 'connected',
      gatewayId: boundGateway.gatewayId
    }];

    console.log('转换后的agents数组:', agents);
    console.log('agents数量:', agents.length);

    renderAgentTabs();

    // 自动选中第一个Agent
    if (agents.length > 0) {
      switchAgentTab(agents[0].id);
    }
  } catch (error) {
    console.error('加载Agent列表失败:', error);
  }
}

// 页面加载时从后端获取Agent列表
document.addEventListener('DOMContentLoaded', () => {
  loadAgentsFromBackend();
});

// ==================== 删除账号函数 ====================
function deleteAccount() {
  const userToken = localStorage.getItem('token');
  
  if (!userToken) {
    alert(t('pleaseLoginFirst'));
    return;
  }

  if (!confirm(t('deleteAccountConfirm'))) {
    return;
  }

  fetch('/api/auth/account', {
    method: 'DELETE',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${userToken}`
    }
  })
  .then(response => response.json())
  .then(data => {
    if (data.success) {
      alert(t('accountDeleted'));
      // 清除本地存储
      localStorage.clear();
      // Navigate in parent window
      window.parent.postMessage({ type: 'navigate', path: '/auth/register' }, '*');
    } else {
      alert(t('deleteFailed') + ': ' + data.message);
    }
  })
  .catch(error => {
    console.error('Delete account failed:', error);
    alert(t('deleteFailed') + ': ' + error.message);
  });
}
