<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 智能体监控系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      text-align: center;
      background: white;
      padding: 40px 60px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      max-width: 600px;
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
      font-size: 28px;
    }
    .description {
      color: #666;
      margin-bottom: 30px;
      font-size: 16px;
      line-height: 1.6;
    }
    .monitor-button {
      display: inline-block;
      padding: 15px 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 18px;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
      margin: 10px;
    }
    .monitor-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
    .info-box {
      margin-top: 30px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 5px;
      text-align: left;
    }
    .info-box h3 {
      color: #333;
      margin-bottom: 10px;
      font-size: 16px;
    }
    .info-box p {
      color: #666;
      font-size: 14px;
      margin: 5px 0;
    }
    .status {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
    }
    .status-success {
      background: #d4edda;
      color: #155724;
    }
    .status-warning {
      background: #fff3cd;
      color: #856404;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 OpenClaw 智能体监控系统</h1>
    <p class="description">
      欢迎使用 OpenClaw 智能体监控系统。<br>
      点击下方按钮进入监控界面,查看Gateway状态、渠道信息和任务列表。
    </p>
    
    <a href="/monitor-ui-v2.html" class="monitor-button">
      📊 进入监控界面
    </a>
    
    <div class="info-box">
      <h3>📋 系统信息</h3>
      <p><strong>监控页面:</strong> monitor-ui-v2.html</p>
      <p><strong>后端API:</strong> /api/gateway/status</p>
      <p><strong>刷新频率:</strong> 30秒</p>
      <p><strong>状态:</strong> <span class="status status-success">✅ 运行正常</span></p>
    </div>
    
    <div class="info-box" style="margin-top: 20px;">
      <h3>🔧 如果遇到问题</h3>
      <p>1. 确保后端服务运行在 http://localhost:3002</p>
      <p>2. 确保前端服务运行在 http://localhost:5173</p>
      <p>3. 清除浏览器缓存后重试</p>
      <p>4. 检查浏览器控制台是否有错误信息</p>
    </div>
  </div>
</body>
</html>
